    function checkPw(){
      if(document.getElementById('pw').value==='Pulse!App0deal#2026'){
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('root').style.display='block';
        sessionStorage.setItem('pulse_auth','1');
      } else {
        document.getElementById('err').classList.add('show');
        document.getElementById('pw').value='';
        setTimeout(()=>document.getElementById('err').classList.remove('show'),2000);
      }
    }
    document.addEventListener('DOMContentLoaded',()=>{
      if(sessionStorage.getItem('pulse_auth')==='1'){
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('root').style.display='block';
      }
      document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()});
    });

    const RENDERERS={birthday:BirthdaySlide,win:WinSlide,clap:ClapSlide,newjoin:NewJoinSlide,event:EventSlide,milestone:MilestoneSlide,reading:ReadingSlide,officelife:OfficeLifeSlide,celebration:CelebrationSlide,funquote:GenericSlide};

    function App(){
      const[cur,setCur]=useState(0);
      const[paused,setPaused]=useState(false);
      const[clock,setClock]=useState(timeStr());
      const[prog,setProg]=useState(0);
      const[anim,setAnim]=useState(0);
      const DUR=9000;
      const go=useCallback(i=>{setCur(i);setAnim(a=>a+1)},[]);
      const curRef=useRef(cur);curRef.current=cur;
      const next=useCallback(()=>go((curRef.current+1)%SLIDES.length),[go]);
      const prev=useCallback(()=>go((curRef.current-1+SLIDES.length)%SLIDES.length),[go]);

      useEffect(()=>{if(paused)return;setProg(0);const t0=Date.now();const pi=setInterval(()=>setProg(Math.min(((Date.now()-t0)/DUR)*100,100)),60);const ti=setTimeout(next,DUR);return()=>{clearTimeout(ti);clearInterval(pi)}},[cur,paused,next]);
      useEffect(()=>{const t=setInterval(()=>setClock(timeStr()),10000);return()=>clearInterval(t)},[]);
      useEffect(()=>{const handler=e=>{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key===" "){e.preventDefault();setPaused(p=>!p)}};window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler)},[next,prev]);

      if(!SLIDES||SLIDES.length===0)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#666",fontSize:24}},"No slides available.");
      const sl=SLIDES[cur]||SLIDES[0];const accent=sl.accent||"#00FFD1";const gradient=sl.gradient||`linear-gradient(135deg,${accent},#5D2CAC)`;const R=(RENDERERS[sl.type]||GenericSlide);

      return h("div",{style:{position:"relative",width:"100%",height:"100vh",background:"#08080c",fontFamily:"'Outfit',sans-serif",color:"#f0f0f5",overflow:"hidden",display:"flex",flexDirection:"column"}},
        // Holographic background glow
        h("div",{style:{position:"absolute",top:"-20%",right:"-10%",width:"60%",height:"70%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse,${accent}08 0%,transparent 60%)`,filter:"blur(80px)",transition:"background 1.5s"}}),
        h("div",{style:{position:"absolute",bottom:"-20%",left:"-10%",width:"50%",height:"60%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:"radial-gradient(ellipse,rgba(93,44,172,0.06) 0%,transparent 60%)",filter:"blur(80px)"}}),
        // Particles
        h("div",{style:{position:"absolute",inset:0,pointerEvents:"none",zIndex:0}},particles.map(p=>h("div",{key:p.id,style:{position:"absolute",left:p.x+"%",top:p.y+"%",width:p.size,height:p.size,borderRadius:"50%",background:accent,opacity:p.op,animation:`float ${p.dur}s ease-in-out ${p.delay}s infinite`,transition:"background 1.2s,opacity 1.2s"}}))),
        // Top accent bar — holographic
        h("div",{style:{position:"absolute",top:0,left:0,right:0,height:4,zIndex:5,background:gradient,transition:"background 0.8s"}}),
        // Header
        h("header",{style:{position:"relative",zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 36px"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:12}},h("div",{style:{width:10,height:10,borderRadius:"50%",background:accent,transition:"background 0.8s",boxShadow:`0 0 12px ${accent}60`}}),h("span",{style:{fontWeight:800,fontSize:18,letterSpacing:3,color:"#fff"}},"APPODEAL"),h("span",{style:{color:"rgba(255,255,255,0.12)",fontSize:22}},"·"),h("span",{style:{fontWeight:500,fontSize:16,letterSpacing:5,color:"rgba(255,255,255,0.3)"}},"PULSE")),
          h("div",{style:{display:"flex",alignItems:"center",gap:16}},h("span",{style:{width:8,height:8,borderRadius:"50%",background:"#22c55e",animation:"blink 2s ease-in-out infinite"}}),h("span",{style:{fontSize:13,fontWeight:700,letterSpacing:2,color:"#22c55e"}},"LIVE"),h("span",{style:{fontWeight:600,fontSize:20,color:"#fff",fontVariantNumeric:"tabular-nums"}},clock),h("span",{style:{fontSize:16,color:"rgba(255,255,255,0.35)"}},dateStr))
        ),
        // Main content
        h("main",{key:anim,style:{flex:1,position:"relative",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 48px",animation:"slideUp 0.5s cubic-bezier(0.16,1,0.3,1)"}},h(R,{d:sl})),
        // Footer
        h("footer",{style:{position:"relative",zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 36px 20px"}},
          h("div",{style:{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",maxWidth:"45%"}},SLIDES.map((_,i)=>h("button",{key:i,onClick:()=>go(i),style:{height:8,borderRadius:4,border:"none",cursor:"pointer",padding:0,flexShrink:0,transition:"all 0.35s cubic-bezier(0.16,1,0.3,1)",background:i===cur?accent:"rgba(255,255,255,0.1)",width:i===cur?36:8,opacity:i===cur?1:0.5,boxShadow:i===cur?`0 0 8px ${accent}40`:"none"}}))),
          h("div",{style:{display:"flex",gap:8}},["‹",paused?"▶":"❚❚","›"].map((label,i)=>h("button",{key:i,onClick:[prev,()=>setPaused(p=>!p),next][i],style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.6)",width:40,height:40,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}},label))),
          h("div",{style:{fontSize:16,color:"rgba(255,255,255,0.22)",fontVariantNumeric:"tabular-nums"}},(cur+1)+" / "+SLIDES.length)

    }

    const st={
