        document.getElementById('root').style.display='block';
        sessionStorage.setItem('pulse_auth','1');
      } else {
        document.getElementById('err').classList.add('show');
        document.getElementById('pw').value='';
        setTimeout(()=>document.getElementById('err').classList.remove('show'),2000);
      }
    }
    document.addEventListener('DOMContentLoaded',()=>{
      if(sessionStorage.getItem('pulse_auth')==='1'){

    function OfficeLifeSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"OFFICE LIFE",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("h3",{style:{fontSize:28,fontWeight:600,margin:"0 0 14px",color:"#f0f0f5"}},d.headline),d.quote?h("blockquote",{style:{...st.quote,borderLeftColor:pal.c1}},'"'+d.quote+'"'):null,h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:22}},d.avatar?h(Avatar,{name:d.author,src:d.avatar,size:80,accent:pal.c1}):null,h("span",{style:{fontSize:20,color:"rgba(255,255,255,0.4)"}},"— "+(d.author||""))),d.reactions?h("div",{style:{fontSize:22,fontWeight:600,marginBottom:14,letterSpacing:1,color:pal.c1}},d.reactions):null,d.channel?h("div",{style:st.chTag},d.channel):null)}

    function CelebrationSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"WEEKLY RITUAL",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("h3",{style:{fontSize:28,fontWeight:600,margin:"0 0 14px",color:"#f0f0f5"}},d.headline),h("div",{style:{display:"flex",flexDirection:"column",gap:14,maxWidth:700,margin:"0 auto 20px"}},[d.prompt1,d.prompt2].filter(Boolean).map((p,i)=>h("div",{key:i,style:{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"16px 22px",fontSize:20,lineHeight:1.6,color:"rgba(255,255,255,0.55)",textAlign:"left",border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}},p))),d.coreValue?h("p",{style:{...st.body,fontStyle:"italic",maxWidth:650}},d.coreValue):null,d.channel?h("div",{style:st.chTag},d.channel):null)}

    function GenericSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:(d.type||"INFO").toUpperCase(),accent:pal.c1,emoji:d.emoji||"📌"}),h(SlideTitle,{text:d.title||"Update",color:pal.c2}),d.headline?h("h3",{style:{fontSize:28,fontWeight:600,color:"#f0f0f5"}},d.headline):null,d.description?h("p",{style:st.body},d.description):null)}

    const RENDERERS={birthday:BirthdaySlide,win:WinSlide,clap:ClapSlide,newjoin:NewJoinSlide,event:EventSlide,milestone:MilestoneSlide,reading:ReadingSlide,officelife:OfficeLifeSlide,celebration:CelebrationSlide,funquote:GenericSlide};

    function App(){
      const[cur,setCur]=useState(0);
      const[paused,setPaused]=useState(false);
      const[clock,setClock]=useState(timeStr());
      const[prog,setProg]=useState(0);
      const[anim,setAnim]=useState(0);
      const DUR=9000;
      const go=useCallback(i=>{setCur(i);setAnim(a=>a+1)},[]);
      const curRef=useRef(cur);curRef.current=cur;
      const next=useCallback(()=>go((curRef.current+1)%SLIDES.length),[go]);
      const prev=useCallback(()=>go((curRef.current-1+SLIDES.length)%SLIDES.length),[go]);

      useEffect(()=>{if(paused)return;setProg(0);const t0=Date.now();const pi=setInterval(()=>setProg(Math.min(((Date.now()-t0)/DUR)*100,100)),60);const ti=setTimeout(next,DUR);return()=>{clearTimeout(ti);clearInterval(pi)}},[cur,paused,next]);
      useEffect(()=>{const t=setInterval(()=>setClock(timeStr()),10000);return()=>clearInterval(t)},[]);
      useEffect(()=>{const handler=e=>{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key===" "){e.preventDefault();setPaused(p=>!p)}};window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler)},[next,prev]);

      if(!SLIDES||SLIDES.length===0)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#999",fontSize:24,background:"#08080c"}},"No slides available.");
      const sl=SLIDES[cur]||SLIDES[0];
      const pal=holo(cur);
      const R=(RENDERERS[sl.type]||GenericSlide);

      return h("div",{style:{position:"relative",width:"100%",height:"100vh",background:"#08080c",fontFamily:"'Outfit',sans-serif",color:"#f0f0f5",overflow:"hidden",display:"flex",flexDirection:"column"}},
        // ── Holographic gradient blobs (animated, per-slide color) ──
        h("div",{key:"blob1-"+cur,style:{position:"absolute",top:"-15%",right:"-8%",width:"55%",height:"65%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse at 40% 40%, ${pal.c1}22 0%, ${pal.c2}12 40%, transparent 70%)`,filter:"blur(60px)",animation:"blobMove1 20s ease-in-out infinite",transition:"background 1.5s ease"}}),
        h("div",{key:"blob2-"+cur,style:{position:"absolute",bottom:"-18%",left:"-8%",width:"50%",height:"60%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse at 60% 60%, ${pal.c2}18 0%, ${pal.c1}0a 40%, transparent 70%)`,filter:"blur(60px)",animation:"blobMove2 25s ease-in-out infinite",transition:"background 1.5s ease"}}),
        // Small accent blob top-left
        h("div",{style:{position:"absolute",top:"10%",left:"5%",width:"20%",height:"25%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse, ${pal.c1}0c 0%, transparent 60%)`,filter:"blur(40px)",transition:"background 1.5s"}}),

        // ── Top holographic accent bar ──
        h("div",{style:{position:"absolute",top:0,left:0,right:0,height:4,zIndex:5,background:`linear-gradient(90deg,${pal.c1},${pal.c2},${pal.c1})`,backgroundSize:"200% 100%",animation:"holoShift 3s ease infinite"}}),

        // ── Header ──
        h("header",{style:{position:"relative",zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 36px"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:12}},
            h("div",{style:{width:10,height:10,borderRadius:"50%",background:pal.c1,transition:"background 0.8s",boxShadow:`0 0 12px ${pal.c1}50`}}),
            h("span",{style:{fontWeight:800,fontSize:18,letterSpacing:3,color:"#fff"}},"APPODEAL"),
            h("span",{style:{color:"rgba(255,255,255,0.12)",fontSize:22}},"·"),
            h("span",{style:{fontWeight:500,fontSize:16,letterSpacing:5,color:"rgba(255,255,255,0.3)"}},"PULSE")),
          h("div",{style:{display:"flex",alignItems:"center",gap:16}},
            h("span",{style:{width:8,height:8,borderRadius:"50%",background:"#22c55e",animation:"blink 2s ease-in-out infinite"}}),
            h("span",{style:{fontSize:13,fontWeight:700,letterSpacing:2,color:"#22c55e"}},"LIVE"),
            h("span",{style:{fontWeight:600,fontSize:20,color:"#fff",fontVariantNumeric:"tabular-nums"}},clock),
            h("span",{style:{fontSize:16,color:"rgba(255,255,255,0.3)"}},dateStr))
        ),

        // ── Main content ──
        h("main",{key:anim,style:{flex:1,position:"relative",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 48px",animation:"slideUp 0.5s cubic-bezier(0.16,1,0.3,1)"}},h(R,{d:sl,pal:pal})),

        // ── Footer ──
        h("footer",{style:{position:"relative",zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 36px 20px"}},
          h("div",{style:{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",maxWidth:"45%"}},SLIDES.map((_,i)=>{
            const dotPal=holo(i);
            return h("button",{key:i,onClick:()=>go(i),style:{height:8,borderRadius:4,border:"none",cursor:"pointer",padding:0,flexShrink:0,transition:"all 0.35s cubic-bezier(0.16,1,0.3,1)",background:i===cur?dotPal.grad:"rgba(255,255,255,0.1)",width:i===cur?36:8,opacity:i===cur?1:0.5,boxShadow:i===cur?`0 0 10px ${dotPal.c1}40`:"none"}})
          })),
          h("div",{style:{display:"flex",gap:8}},["‹",paused?"▶":"❚❚","›"].map((label,i)=>h("button",{key:i,onClick:[prev,()=>setPaused(p=>!p),next][i],style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",width:40,height:40,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}},label))),
          h("div",{style:{fontSize:16,color:"rgba(255,255,255,0.3)",fontVariantNumeric:"tabular-nums"}},(cur+1)+" / "+SLIDES.length)
        ),

        // ── Progress bar ──
        h("div",{style:{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.06)",zIndex:5}},h("div",{style:{height:"100%",width:prog+"%",background:pal.grad,transition:"width 0.08s linear",borderRadius:"0 2px 2px 0"}}))
      );
    }

    const st={
      inner:{maxWidth:800,width:"100%",textAlign:"center"},
      heroName:{fontSize:38,fontWeight:700,color:"#f0f0f5",marginBottom:6},
      sub:{fontSize:20,color:"rgba(255,255,255,0.4)",marginBottom:22},
      body:{fontSize:22,lineHeight:1.7,color:"rgba(255,255,255,0.55)",maxWidth:700,margin:"0 auto 20px",fontWeight:300},
      note:{fontSize:22,fontWeight:600,marginBottom:22},
      card:{background:"rgba(255,255,255,0.04)",borderRadius:18,padding:"24px 30px",maxWidth:700,margin:"0 auto",textAlign:"left",border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 4px 24px rgba(0,0,0,0.3)",backdropFilter:"blur(12px)"},
      chipRow:{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:8,marginBottom:20},
      chip:{padding:"8px 18px",borderRadius:22,fontSize:18,fontWeight:500,border:"1px solid",background:"rgba(255,255,255,0.06)",color:"#f0f0f5"},
      vChip:{padding:"6px 14px",borderRadius:8,fontSize:14,fontWeight:700,letterSpacing:0.5},
      quote:{borderLeft:"4px solid",paddingLeft:22,margin:"0 auto 20px",maxWidth:650,textAlign:"left",fontSize:22,lineHeight:1.7,color:"rgba(255,255,255,0.55)",fontStyle:"italic",fontWeight:300},
      chTag:{display:"inline-block",marginTop:10,fontSize:16,color:"rgba(255,255,255,0.3)",letterSpacing:0.5},
    };

    ReactDOM.render(h(App),document.getElementById("root"));
  </script>
