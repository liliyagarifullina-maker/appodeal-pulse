    body{background:#08080c;font-family:'Outfit',sans-serif;color:#f0f0f5;overflow:hidden;cursor:none}
    @keyframes float{0%,100%{transform:translateY(0) translateX(0)}33%{transform:translateY(-20px) translateX(14px)}66%{transform:translateY(-10px) translateX(-8px)}}
    @keyframes confettiBounce{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(12deg)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes holoShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes blobMove1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}
    @keyframes blobMove2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-30px,40px) scale(0.95)}66%{transform:translate(30px,-20px) scale(1.05)}}
    #root{width:100vw;height:100vh;display:none}
    #gate{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#08080c}
    #gate .glow{position:absolute;width:800px;height:800px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,255,209,0.06) 0%,rgba(93,44,172,0.04) 30%,transparent 60%);top:50%;left:50%;transform:translate(-50%,-50%)}
    #gate .logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
    #gate .logo span:first-child{font-weight:800;font-size:20px;letter-spacing:3px;color:#fff}
    #gate .logo span:nth-child(2){color:rgba(255,255,255,0.12);font-size:24px}
    #gate .logo span:last-child{font-weight:500;font-size:16px;letter-spacing:5px;color:rgba(255,255,255,0.3)}
    #gate input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 24px;width:320px;color:#fff;font-family:'Outfit',sans-serif;font-size:18px;text-align:center;outline:none;transition:border-color 0.3s}
    #gate input:focus{border-color:rgba(0,255,209,0.5)}
    #gate input::placeholder{color:rgba(255,255,255,0.2)}
    #gate .btn{margin-top:16px;background:linear-gradient(135deg,#00FFD1 0%,#5D2CAC 50%,#1667EF 100%);background-size:200% 200%;animation:holoShift 4s ease infinite;border:none;border-radius:10px;padding:14px 42px;color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:opacity 0.3s}
    #gate .btn:hover{opacity:0.85}
    #gate .err{color:#E84039;font-size:14px;margin-top:12px;height:18px;opacity:0;transition:opacity 0.3s}
    #gate .err.show{opacity:1}
    .hidden{display:none!important}
  </style>

    // Auto-reload every 60 minutes to pick up new slides
    setTimeout(function(){ location.reload(); }, 60 * 60 * 1000);
  </script>

  <div id="gate">
    <div class="glow"></div>
    <div class="logo">
      <span>APPODEAL</span><span>·</span><span>PULSE</span>
    </div>
    <input type="password" id="pw" placeholder="Enter password" autofocus />
    <button class="btn" onclick="checkPw()">ACCESS</button>
    <div class="err" id="err">Incorrect password</div>
  </div>
  <script>
    function checkPw(){
      if(document.getElementById('pw').value==='Pulse!App0deal#2026'){
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('root').style.display='block';
        sessionStorage.setItem('pulse_auth','1');
      } else {
        document.getElementById('err').classList.add('show');
        document.getElementById('pw').value='';
        setTimeout(()=>document.getElementById('err').classList.remove('show'),2000);
      }
    }
    document.addEventListener('DOMContentLoaded',()=>{
      if(sessionStorage.getItem('pulse_auth')==='1'){
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('root').style.display='block';
      }
      document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()});
    });
  </script>

    const{useState,useEffect,useCallback,useRef,createElement:h}=React;
    const timeStr=()=>new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const dateStr=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

    // ── Holographic color palettes that alternate per slide ──
    const HOLO=[
      {c1:"#00C9DB",c2:"#8B5CF6",grad:"linear-gradient(135deg,#00C9DB,#8B5CF6)"},
      {c1:"#8B5CF6",c2:"#EC4899",grad:"linear-gradient(135deg,#8B5CF6,#EC4899)"},
      {c1:"#EC4899",c2:"#F59E0B",grad:"linear-gradient(135deg,#EC4899,#F59E0B)"},
      {c1:"#F59E0B",c2:"#00FFD1",grad:"linear-gradient(135deg,#F59E0B,#00FFD1)"},
      {c1:"#00FFD1",c2:"#1667EF",grad:"linear-gradient(135deg,#00FFD1,#1667EF)"},
      {c1:"#1667EF",c2:"#00C9DB",grad:"linear-gradient(135deg,#1667EF,#00C9DB)"},
    ];
    function holo(i){return HOLO[i%HOLO.length]}

    // ── Avatar ──
    function Avatar({name,src,size,accent}){
      const sz=size||90;
      const border=sz>60?4:3;
      if(src)return h("img",{src,style:{width:sz,height:sz,borderRadius:"50%",objectFit:"cover",border:`${border}px solid ${accent||"#00C9DB"}`,boxShadow:`0 4px 20px ${accent||"#00C9DB"}30`,flexShrink:0}});
      const ini=(name||"?").split(" ").map(n=>n[0]).join("").slice(0,2);
      return h("div",{style:{width:sz,height:sz,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.35,fontWeight:700,color:"#fff",background:`linear-gradient(135deg,${accent||"#00C9DB"},${accent?"#8B5CF6":"#EC4899"})`,boxShadow:`0 4px 20px ${accent||"#00C9DB"}25`,flexShrink:0}},ini);
    }

    // ── Shared UI components ──
    function Badge({text,accent,emoji}){return h("div",{style:{display:"inline-block",padding:"8px 22px",borderRadius:24,fontSize:14,fontWeight:800,letterSpacing:3,marginBottom:18,background:accent+"15",color:accent,border:`1.5px solid ${accent}35`,backdropFilter:"blur(8px)"}},emoji+" "+text)}

    function SlideTitle({text,color}){return h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:52,fontWeight:600,margin:"0 0 24px",lineHeight:1.1,color:color||"#f0f0f5"}},text)}

    // ── Slide renderers ──

    function EventSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"EVENT",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("div",{style:st.card},h("h3",{style:{fontSize:28,fontWeight:700,margin:"0 0 8px",color:"#f0f0f5"}},d.eventName),h("div",{style:{fontSize:20,fontWeight:600,marginBottom:18,color:pal.c1}},d.date),h("p",{style:{fontSize:20,lineHeight:1.7,color:"rgba(255,255,255,0.55)",margin:"0 0 14px",fontWeight:300}},d.description),d.organizer?h("div",{style:{display:"flex",alignItems:"center",gap:10,marginTop:12}},d.organizerAvatar?h(Avatar,{name:d.organizer,src:d.organizerAvatar,size:44,accent:pal.c1}):null,h("span",{style:{fontSize:18,color:"rgba(255,255,255,0.35)"}},"Organized by ",h("strong",{style:{color:"#f0f0f5"}},d.organizer))):null))}

    function MilestoneSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"MILESTONE",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("div",{style:{marginBottom:20}},h("div",{style:{fontSize:80,fontWeight:900,lineHeight:1,marginBottom:6,background:pal.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},d.stat),h("div",{style:{fontSize:16,color:"rgba(255,255,255,0.3)",letterSpacing:2,textTransform:"uppercase",fontWeight:500}},d.statLabel)),h("h3",{style:{fontSize:28,fontWeight:600,margin:"0 0 12px",color:"#f0f0f5"}},d.headline),h("p",{style:st.body},d.description))}

    function ReadingSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"RECOMMENDED",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("div",{style:{display:"flex",flexDirection:"column",gap:18,maxWidth:780,margin:"0 auto 18px"}},(d.articles||[]).map((a,i)=>h("div",{key:i,style:{display:"flex",gap:20,textAlign:"left",background:"rgba(255,255,255,0.04)",borderRadius:18,padding:"24px 28px",border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 2px 16px rgba(0,0,0,0.2)",backdropFilter:"blur(10px)"}},h("div",{style:{fontSize:42,fontWeight:800,lineHeight:1,minWidth:52,background:pal.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"0"+(i+1)),h("div",{style:{flex:1}},h("div",{style:{fontSize:26,fontWeight:700,color:"#f0f0f5",marginBottom:8}},a.title),h("div",{style:{fontSize:20,lineHeight:1.6,color:"rgba(255,255,255,0.55)",fontWeight:300,marginBottom:8}},a.desc),h("div",{style:{display:"flex",alignItems:"center",gap:8,fontSize:17,color:"rgba(255,255,255,0.3)"}},a.sharedByAvatar?h(Avatar,{name:a.sharedBy,src:a.sharedByAvatar,size:32,accent:pal.c1}):null,"Shared by "+a.sharedBy+(a.reactions?" · "+a.reactions:"")))))),d.channel?h("div",{style:st.chTag},d.channel):null)}

    function OfficeLifeSlide({d,pal}){return h("div",{style:st.inner},h(Badge,{text:"OFFICE LIFE",accent:pal.c1,emoji:d.emoji}),h(SlideTitle,{text:d.title,color:pal.c2}),h("h3",{style:{fontSize:28,fontWeight:600,margin:"0 0 14px",color:"#f0f0f5"}},d.headline),d.quote?h("blockquote",{style:{...st.quote,borderLeftColor:pal.c1}},'"'+d.quote+'"'):null,h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:22}},d.avatar?h(Avatar,{name:d.author,src:d.avatar,size:80,accent:pal.c1}):null,h("span",{style:{fontSize:20,color:"rgba(255,255,255,0.4)"}},"— "+(d.author||""))),d.reactions?h("div",{style:{fontSize:22,fontWeight:600,marginBottom:14,letterSpacing:1,color:pal.c1}},d.reactions):null,d.channel?h("div",{style:st.chTag},d.channel):null)}

    const RENDERERS={birthday:BirthdaySlide,win:WinSlide,clap:ClapSlide,newjoin:NewJoinSlide,event:EventSlide,milestone:MilestoneSlide,reading:ReadingSlide,officelife:OfficeLifeSlide,celebration:CelebrationSlide,funquote:GenericSlide};

    function App(){
      const[cur,setCur]=useState(0);
      const[paused,setPaused]=useState(false);
      const[clock,setClock]=useState(timeStr());
      const[prog,setProg]=useState(0);
      const[anim,setAnim]=useState(0);
      const DUR=9000;
      const go=useCallback(i=>{setCur(i);setAnim(a=>a+1)},[]);
      const curRef=useRef(cur);curRef.current=cur;
      const next=useCallback(()=>go((curRef.current+1)%SLIDES.length),[go]);
      const prev=useCallback(()=>go((curRef.current-1+SLIDES.length)%SLIDES.length),[go]);

      useEffect(()=>{if(paused)return;setProg(0);const t0=Date.now();const pi=setInterval(()=>setProg(Math.min(((Date.now()-t0)/DUR)*100,100)),60);const ti=setTimeout(next,DUR);return()=>{clearTimeout(ti);clearInterval(pi)}},[cur,paused,next]);
      useEffect(()=>{const t=setInterval(()=>setClock(timeStr()),10000);return()=>clearInterval(t)},[]);
      useEffect(()=>{const handler=e=>{if(e.key==="ArrowRight")next();if(e.key==="ArrowLeft")prev();if(e.key===" "){e.preventDefault();setPaused(p=>!p)}};window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler)},[next,prev]);

      if(!SLIDES||SLIDES.length===0)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#999",fontSize:24,background:"#08080c"}},"No slides available.");
      const sl=SLIDES[cur]||SLIDES[0];
      const pal=holo(cur);
      const R=(RENDERERS[sl.type]||GenericSlide);

      return h("div",{style:{position:"relative",width:"100%",height:"100vh",background:"#08080c",fontFamily:"'Outfit',sans-serif",color:"#f0f0f5",overflow:"hidden",display:"flex",flexDirection:"column"}},
        // ── Holographic gradient blobs (animated, per-slide color) ──
        h("div",{key:"blob1-"+cur,style:{position:"absolute",top:"-15%",right:"-8%",width:"55%",height:"65%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse at 40% 40%, ${pal.c1}22 0%, ${pal.c2}12 40%, transparent 70%)`,filter:"blur(60px)",animation:"blobMove1 20s ease-in-out infinite",transition:"background 1.5s ease"}}),
        h("div",{key:"blob2-"+cur,style:{position:"absolute",bottom:"-18%",left:"-8%",width:"50%",height:"60%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse at 60% 60%, ${pal.c2}18 0%, ${pal.c1}0a 40%, transparent 70%)`,filter:"blur(60px)",animation:"blobMove2 25s ease-in-out infinite",transition:"background 1.5s ease"}}),
        // Small accent blob top-left
        h("div",{style:{position:"absolute",top:"10%",left:"5%",width:"20%",height:"25%",borderRadius:"50%",pointerEvents:"none",zIndex:0,background:`radial-gradient(ellipse, ${pal.c1}0c 0%, transparent 60%)`,filter:"blur(40px)",transition:"background 1.5s"}}),

        // ── Top holographic accent bar ──
        h("div",{style:{position:"absolute",top:0,left:0,right:0,height:4,zIndex:5,background:`linear-gradient(90deg,${pal.c1},${pal.c2},${pal.c1})`,backgroundSize:"200% 100%",animation:"holoShift 3s ease infinite"}}),

        // ── Header ──
        h("header",{style:{position:"relative",zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 36px"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:12}},
            h("div",{style:{width:10,height:10,borderRadius:"50%",background:pal.c1,transition:"background 0.8s",boxShadow:`0 0 12px ${pal.c1}50`}}),
            h("span",{style:{fontWeight:800,fontSize:18,letterSpacing:3,color:"#fff"}},"APPODEAL"),
            h("span",{style:{color:"rgba(255,255,255,0.12)",fontSize:22}},"·"),
            h("span",{style:{fontWeight:500,fontSize:16,letterSpacing:5,color:"rgba(255,255,255,0.3)"}},"PULSE")),
          h("div",{style:{display:"flex",alignItems:"center",gap:16}},
            h("span",{style:{width:8,height:8,borderRadius:"50%",background:"#22c55e",animation:"blink 2s ease-in-out infinite"}}),
            h("span",{style:{fontSize:13,fontWeight:700,letterSpacing:2,color:"#22c55e"}},"LIVE"),
            h("span",{style:{fontWeight:600,fontSize:20,color:"#fff",fontVariantNumeric:"tabular-nums"}},clock),
            h("span",{style:{fontSize:16,color:"rgba(255,255,255,0.3)"}},dateStr))
        ),

        // ── Main content ──
        h("main",{key:anim,style:{flex:1,position:"relative",zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 48px",animation:"slideUp 0.5s cubic-bezier(0.16,1,0.3,1)"}},h(R,{d:sl,pal:pal})),

            const dotPal=holo(i);
            return h("button",{key:i,onClick:()=>go(i),style:{height:8,borderRadius:4,border:"none",cursor:"pointer",padding:0,flexShrink:0,transition:"all 0.35s cubic-bezier(0.16,1,0.3,1)",background:i===cur?dotPal.grad:"rgba(255,255,255,0.1)",width:i===cur?36:8,opacity:i===cur?1:0.5,boxShadow:i===cur?`0 0 10px ${dotPal.c1}40`:"none"}})
          })),
          h("div",{style:{display:"flex",gap:8}},["‹",paused?"▶":"❚❚","›"].map((label,i)=>h("button",{key:i,onClick:[prev,()=>setPaused(p=>!p),next][i],style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",width:40,height:40,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}},label))),
          h("div",{style:{fontSize:16,color:"rgba(255,255,255,0.3)",fontVariantNumeric:"tabular-nums"}},(cur+1)+" / "+SLIDES.length)
        ),

        // ── Progress bar ──
        h("div",{style:{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.06)",zIndex:5}},h("div",{style:{height:"100%",width:prog+"%",background:pal.grad,transition:"width 0.08s linear",borderRadius:"0 2px 2px 0"}}))
      );
    }

    const st={
      inner:{maxWidth:800,width:"100%",textAlign:"center"},
      heroName:{fontSize:38,fontWeight:700,color:"#f0f0f5",marginBottom:6},
      sub:{fontSize:20,color:"rgba(255,255,255,0.4)",marginBottom:22},

  </script>
